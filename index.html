<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MRMUJI_FX — AI Trading Journal</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .container {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 20px;
    padding: 40px;
    width: 100%; max-width: 420px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
  }
  .logo-wrap { text-align: center; margin-bottom: 25px; }
  .logo-wrap img {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: #fff;
    padding: 8px;
    box-shadow: 0 8px 25px rgba(255, 215, 0, 0.3);
  }
  h1 {
    color: #FFD700; text-align: center;
    font-size: 26px; margin-bottom: 6px;
    letter-spacing: 2px;
  }
  .tagline {
    color: #a0a0c0; text-align: center;
    font-size: 13px; margin-bottom: 30px;
  }
  .tabs { display: flex; margin-bottom: 25px; background: rgba(0,0,0,0.3); border-radius: 10px; padding: 4px; }
  .tab {
    flex: 1; padding: 10px; text-align: center; cursor: pointer;
    color: #a0a0c0; border-radius: 8px; transition: all 0.3s;
    font-weight: 600; font-size: 14px;
  }
  .tab.active { background: #FFD700; color: #1a1a2e; }
  .form { display: none; }
  .form.active { display: block; }
  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; color: #c0c0d0; font-size: 13px; margin-bottom: 6px; }
  .input-group input {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 8px; color: #fff; font-size: 14px;
    transition: all 0.3s;
  }
  .input-group input:focus {
    outline: none; border-color: #FFD700;
    background: rgba(255,255,255,0.12);
  }
  .btn {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
    color: #1a1a2e; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    margin-top: 10px; transition: transform 0.2s;
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255,215,0,0.4); }
  .btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .message {
    margin-top: 15px; padding: 10px;
    border-radius: 8px; font-size: 13px; text-align: center;
    display: none;
  }
  .message.error { background: rgba(255,80,80,0.15); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.3); display: block; }
  .message.success { background: rgba(80,255,150,0.15); color: #6bff9e; border: 1px solid rgba(80,255,150,0.3); display: block; }
  .footer { text-align: center; margin-top: 25px; color: #707090; font-size: 12px; }
</style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="logo.jpg" alt="MRMUJI_FX Logo">
    </div>
    <h1>MRMUJI_FX</h1>
    <p class="tagline">AI-Powered Trading Journal</p>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">Login</div>
      <div class="tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN FORM -->
    <form class="form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="loginEmail" required placeholder="you@example.com">
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" id="loginPassword" required placeholder="••••••••">
      </div>
      <button class="btn" type="submit" id="loginBtn">LOGIN</button>
    </form>

    <!-- SIGNUP FORM -->
    <form class="form" id="signupForm" onsubmit="handleSignup(event)">
      <div class="input-group">
        <label>Full Name</label>
        <input type="text" id="signupName" required placeholder="John Doe">
      </div>
      <div class="input-group">
        <label>Email</label>
        <input type="email" id="signupEmail" required placeholder="you@example.com">
      </div>
      <div class="input-group">
        <label>Password (min 6 chars)</label>
        <input type="password" id="signupPassword" required minlength="6" placeholder="••••••••">
      </div>
      <button class="btn" type="submit" id="signupBtn">CREATE ACCOUNT</button>
    </form>

    <div class="message" id="message"></div>

    <p class="footer">© 2025 MRMUJI_FX • All rights reserved</p>
  </div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword,
    signInWithEmailAndPassword, updateProfile
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import {
    getFirestore, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_z9TCT0ftHruzgI8MQ2S8gMK4-T4UA",
    authDomain: "mujifx-74d33.firebaseapp.com",
    projectId: "mujifx-74d33",
    storageBucket: "mujifx-74d33.appspot.com",
    messagingSenderId: "191070893489",
    appId: "1:191070893489:web:f325f9699838eaf2e94520",
    measurementId: "G-M84JLX3FX9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab + 'Form').classList.add('active');
    document.getElementById('message').className = 'message';
  };

  function showMsg(text, type) {
    const m = document.getElementById('message');
    m.textContent = text;
    m.className = 'message ' + type;
  }

  window.handleLogin = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'LOGGING IN...';
    try {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const cred = await signInWithEmailAndPassword(auth, email, password);
      showMsg('✅ Welcome back, ' + (cred.user.displayName || 'Trader') + '!', 'success');
      // TODO: redirect to dashboard later
      // setTimeout(() => window.location.href = 'dashboard.html', 1500);
    } catch (err) {
      showMsg('❌ ' + (err.code === 'auth/invalid-credential' ? 'Wrong email or password' : err.message), 'error');
    }
    btn.disabled = false; btn.textContent = 'LOGIN';
  };

  window.handleSignup = async function(e) {
    e.preventDefault();
    const btn = document.getElementById('signupBtn');
    btn.disabled = true; btn.textContent = 'CREATING...';
    try {
      const name = document.getElementById('signupName').value;
      const email = document.getElementById('signupEmail').value;
      const password = document.getElementById('signupPassword').value;
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      await setDoc(doc(db, 'users', cred.user.uid), {
        name: name, email: email, role: 'trader', createdAt: serverTimestamp()
      });
      showMsg('🎉 Account created! Welcome, ' + name + '!', 'success');
      document.getElementById('signupForm').reset();
    } catch (err) {
      showMsg('❌ ' + (err.code === 'auth/email-already-in-use' ? 'Email already registered' : err.message), 'error');
    }
    btn.disabled = false; btn.textContent = 'CREATE ACCOUNT';
  };
</script>
</body>
</html>
