<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MrMuji FX Journal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA_29jtFTC6frhuzj8QMH2SBgN4-kTA4UA",
    authDomain: "mujifx-74d33.firebaseapp.com",
    projectId: "mujifx-74d33",
    storageBucket: "mujifx-74d33.firebasestorage.app",
    messagingSenderId: "910789083489",
    appId: "1:910789083489:web:f325f968933eebf2e94520",
    measurementId: "G-M84LKX3FX9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  // =============================================
  // MENTOR UID — Aap pehli baar register karein
  // phir Firebase Console > Authentication > Users
  // mein apni UID copy karke yahan daalein
  // =============================================
  const MENTOR_UID = "APNI_UID_YAHAN_DAALEIN";

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      try {
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
          const data = userDoc.data();
          if (data.role === "mentor") {
            window.location.href = "mentor-dashboard.html";
          } else if (data.status === "approved") {
            window.location.href = "dashboard.html";
          } else if (data.status === "pending") {
            showScreen("pending-screen");
          } else if (data.status === "rejected") {
            showScreen("rejected-screen");
          }
        }
      } catch(e) {
        console.log("User doc error:", e);
      }
    }
  });

  window.handleRegister = async () => {
    const name = document.getElementById("reg-name").value.trim();
    const email = document.getElementById("reg-email").value.trim();
    const pass = document.getElementById("reg-pass").value;
    const pass2 = document.getElementById("reg-pass2").value;
    const btn = document.getElementById("reg-btn");
    if (!name || !email || !pass) return showToast("Saare fields bharein", "error");
    if (pass !== pass2) return showToast("Passwords match nahi hain", "error");
    if (pass.length < 6) return showToast("Password 6+ characters ka hona chahiye", "error");
    btn.disabled = true; btn.textContent = "Register ho raha hai...";
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await sendEmailVerification(cred.user);
      await setDoc(doc(db, "users", cred.user.uid), {
        uid: cred.user.uid, name, email,
        role: "student", status: "pending",
        createdAt: serverTimestamp(), mentorUid: MENTOR_UID
      });
      showToast("Register ho gaye! Approval ka intezaar karein.", "success");
      setTimeout(() => showScreen("pending-screen"), 1800);
    } catch (err) {
      let msg = "Kuch masla hua";
      if (err.code === "auth/email-already-in-use") msg = "Yeh email pehle se registered hai";
      if (err.code === "auth/invalid-email") msg = "Email sahi nahi hai";
      showToast(msg, "error");
    } finally { btn.disabled = false; btn.textContent = "Register Karein"; }
  };

  window.handleLogin = async () => {
    const email = document.getElementById("login-email").value.trim();
    const pass = document.getElementById("login-pass").value;
    const btn = document.getElementById("login-btn");
    if (!email || !pass) return showToast("Email aur password daalein", "error");
    btn.disabled = true; btn.textContent = "Login ho raha hai...";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch (err) {
      let msg = "Email ya password galat hai";
      if (err.code === "auth/user-not-found") msg = "Account nahi mila";
      showToast(msg, "error");
      btn.disabled = false; btn.textContent = "Login Karein";
    }
  };

  window.handleGoogle = async () => {
    try {
      const result = await signInWithPopup(auth, googleProvider);
      const user = result.user;
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (!userDoc.exists()) {
        await setDoc(doc(db, "users", user.uid), {
          uid: user.uid, name: user.displayName, email: user.email,
          role: "student", status: "pending",
          createdAt: serverTimestamp(), mentorUid: MENTOR_UID
        });
      }
      showToast("Google se login ho gaye!", "success");
    } catch (err) { showToast("Google login mein masla hua", "error"); }
  };

  window.handleLogout = async () => {
    await signOut(auth);
    showScreen("auth-screen");
    showToast("Logout ho gaye", "success");
  };
<\/script>

<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --gold-dim: #8B6914;
  --bg: #080808;
  --bg2: #0F0F0F;
  --surface: #141414;
  --surface2: #1A1A1A;
  --border: rgba(201,168,76,0.18);
  --border-h: rgba(201,168,76,0.45);
  --text: #F0EAD6;
  --text-dim: #7A7060;
  --red: #E05252;
  --green: #52C97F;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content:'';
  position:fixed; inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}
.screen { display:none; position:relative; z-index:1; min-height:100vh; }
.screen.active { display:flex; }

/* AUTH */
#auth-screen {
  flex-direction:column; align-items:center;
  justify-content:center; padding:40px 20px;
}

/* LOGO */
.logo-block { text-align:center; margin-bottom:36px; animation: fadeDown .7s ease both; }
.markhor-img {
  width: 110px;
  height: 110px;
  object-fit: contain;
  margin: 0 auto 14px;
  display: block;
  filter:
    drop-shadow(0 0 20px rgba(201,168,76,0.6))
    drop-shadow(0 0 40px rgba(201,168,76,0.3))
    brightness(1.1);
  animation: glow 3s ease-in-out infinite;
}
@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 16px rgba(201,168,76,0.5)) drop-shadow(0 0 32px rgba(201,168,76,0.25)) brightness(1.05); }
  50% { filter: drop-shadow(0 0 28px rgba(201,168,76,0.9)) drop-shadow(0 0 56px rgba(201,168,76,0.45)) brightness(1.15); }
}
.logo-title {
  font-family: 'Cinzel', serif;
  font-size: 26px; font-weight:700; letter-spacing:5px;
  background: linear-gradient(135deg, #8B6914 0%, #C9A84C 40%, #E8C96A 60%, #C9A84C 100%);
  background-size:200%; -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
  animation: shimmer 4s ease infinite;
}
@keyframes shimmer { 0%{background-position:0%} 50%{background-position:100%} 100%{background-position:0%} }
.logo-sub { font-size:10px; letter-spacing:7px; color:var(--text-dim); text-transform:uppercase; margin-top:7px; }

/* CARD */
.auth-card {
  width:100%; max-width:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px; overflow:hidden;
  animation: fadeUp .7s ease .15s both;
  box-shadow: 0 32px 80px rgba(0,0,0,0.7), inset 0 1px 0 rgba(201,168,76,0.08);
}
.tab-bar { display:flex; border-bottom:1px solid var(--border); }
.tab {
  flex:1; padding:15px; text-align:center;
  font-size:12px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer; color:var(--text-dim); background:none;
  border:none; border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:all .25s;
}
.tab.active { color:var(--gold); border-bottom-color:var(--gold); background:rgba(201,168,76,0.04); }
.form-panel { display:none; padding:28px; }
.form-panel.active { display:block; }

.field { margin-bottom:16px; }
.field label { display:block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:7px; }
.field input {
  width:100%; background:var(--bg2); border:1px solid var(--border);
  border-radius:9px; padding:12px 14px; color:var(--text);
  font-family:'Inter',sans-serif; font-size:14px; outline:none;
  transition:border-color .2s, box-shadow .2s;
}
.field input:focus { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.08); }
.field input::placeholder { color:var(--text-dim); }

.btn-gold {
  width:100%; padding:14px;
  background:linear-gradient(135deg, #7A5A10, var(--gold), var(--gold-light));
  background-size:200%;
  color:#080808; border:none; border-radius:9px;
  font-family:'Cinzel',serif; font-size:12px; font-weight:700; letter-spacing:2.5px;
  cursor:pointer; transition:all .3s; margin-top:6px;
}
.btn-gold:hover:not(:disabled) {
  background-position:right; transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(201,168,76,0.35);
}
.btn-gold:disabled { opacity:.45; cursor:not-allowed; }

.btn-google {
  width:100%; padding:11px; background:transparent;
  border:1px solid var(--border); border-radius:9px; color:var(--text);
  font-size:13px; cursor:pointer; display:flex; align-items:center;
  justify-content:center; gap:9px; margin-top:10px; transition:all .2s;
  font-family:'Inter',sans-serif;
}
.btn-google:hover { border-color:var(--border-h); background:rgba(255,255,255,0.02); }

.divider { text-align:center; margin:18px 0 2px; position:relative; }
.divider::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:var(--border); }
.divider span { position:relative; background:var(--surface); padding:0 10px; font-size:10px; color:var(--text-dim); letter-spacing:1px; text-transform:uppercase; }

.note { text-align:center; font-size:11px; color:var(--text-dim); margin-top:14px; line-height:1.8; }

/* STATUS SCREENS */
.status-screen { flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 20px; }
.status-icon { font-size:60px; margin-bottom:20px; }
.status-title { font-family:'Cinzel',serif; font-size:20px; color:var(--gold); margin-bottom:10px; }
.status-msg { color:var(--text-dim); font-size:14px; line-height:1.9; max-width:340px; margin-bottom:26px; }
.btn-outline {
  padding:11px 30px; background:transparent; border:1px solid var(--border);
  border-radius:9px; color:var(--gold); font-family:'Cinzel',serif;
  font-size:11px; letter-spacing:2px; cursor:pointer; transition:all .2s;
}
.btn-outline:hover { border-color:var(--gold); background:rgba(201,168,76,0.04); }

/* TOAST */
#toast {
  position:fixed; bottom:28px; left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface2); border:1px solid var(--border);
  border-radius:10px; padding:13px 22px; font-size:13px;
  z-index:9999; transition:transform .4s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap; box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
#toast.show { transform:translateX(-50%) translateY(0); }
#toast.success { border-color:var(--green); color:var(--green); }
#toast.error { border-color:var(--red); color:var(--red); }

@keyframes fadeDown { from{opacity:0;transform:translateY(-18px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:3px}
</style>
</head>

<div id="toast"></div>

<script>
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  if (tab === 'login') {
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('login-panel').classList.add('active');
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('register-panel').classList.add('active');
  }
}
let tt;
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = \`show \${type}\`;
  clearTimeout(tt); tt = setTimeout(() => t.classList.remove('show'), 3000);
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  document.getElementById('login-panel').classList.contains('active') ? handleLogin() : handleRegister();
});
<\/script>
